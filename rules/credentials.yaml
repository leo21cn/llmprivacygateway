version: "1.0"
category: credentials
description: "凭证信息检测规则"

rules:
  - id: api_key_detector
    name: API Key检测
    type: regex
    entity_type: API_KEY
    pattern: >-
      (?i)(api[_-]?key|apikey)\s*[:=]\s*["']?[a-zA-Z0-9_\-]{16,}["']?
    strategy: replace
    replacement: "<API_KEY>"
    description: 检测API Key
    enabled: true

  - id: password_detector
    name: 密码检测
    type: regex
    entity_type: PASSWORD
    pattern: >-
      (?i)(password|passwd|pwd)\s*[:=]\s*["']?[^"'\s]+["']?
    strategy: replace
    replacement: "<PASSWORD>"
    description: 检测密码
    enabled: true

  - id: token_detector
    name: Token检测
    type: regex
    entity_type: TOKEN
    pattern: >-
      (?i)(token|access_token|auth_token)\s*[:=]\s*["']?[a-zA-Z0-9_\-.]+["']?
    strategy: replace
    replacement: "<TOKEN>"
    description: 检测Token
    enabled: true

  - id: secret_detector
    name: Secret检测
    type: regex
    entity_type: SECRET
    pattern: >-
      (?i)(secret|client_secret)\s*[:=]\s*["']?[a-zA-Z0-9_\-]{16,}["']?
    strategy: replace
    replacement: "<SECRET>"
    description: 检测Secret
    enabled: true
